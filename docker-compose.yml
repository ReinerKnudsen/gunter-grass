services:
  backend:
    build: ./backend
    container_name: gunter-backend
    restart: unless-stopped
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    networks:
      - gunternet

  frontend:
    build: ./frontend
    container_name: gunter-frontend
    restart: unless-stopped
    ports:
      - 3333:80
    networks:
      - gunternet

networks:
  gunternet:
    driver: bridge